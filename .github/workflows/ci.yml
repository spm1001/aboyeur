name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # The sonnette plugin ships a committed single-file bundle
  # (sonnette/conductor-channel.js) because the batterie assembler vendors
  # source trees without node_modules. A src/ edit without a rebuild would
  # ship a stale bundle silently — this job rebuilds and diffs so that
  # drift goes red instead. Bun is pinned to the estate's version: bundler
  # output is only guaranteed reproducible within a bun version.
  sonnette-bundle-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:sonnette
      - name: Bundle must match committed copy
        run: |
          git diff --exit-code sonnette/ || {
            echo "::error::sonnette/conductor-channel.js is stale — run 'npm run build:sonnette' (bun 1.3.14) and commit the result"
            exit 1
          }
